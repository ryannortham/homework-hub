# Portainer stack for Homework Hub.
#
# Deployment: Portainer (https://portainer.homelab) -> Stacks -> Add stack ->
# Build method: Repository (this repo, branch main, compose path
# docker-compose.yml). Set the four BW_* environment variables in the
# Portainer UI -- they are stored encrypted in Portainer's DB and injected
# at runtime (no .env file on the host).
#
# IMAGE BUILD: Portainer's container lacks buildx, so we don't use a
# `build:` directive here. Build the image manually on the TrueNAS host
# whenever the Dockerfile or Python source changes:
#
#     ssh root@192.168.1.100
#     cd /tmp && rm -rf homework-hub-build && \
#         git clone https://github.com/ryannortham/homework-hub homework-hub-build && \
#         cd homework-hub-build && docker build -t homework-hub:latest .
#
# Then click "Update the stack" in Portainer (or wait for GitOps to redeploy)
# and the new image is picked up.
#
# Persistent volumes (bind-mounted from TrueNAS):
#   /mnt/tank/Apps/HomeworkHub/Config/  -> /config  (children.yaml, tokens, state.db)
#   /mnt/tank/Apps/HomeworkHub/Logs/    -> /logs    (rotating logs)

services:
  homework-hub:
    container_name: homework-hub
    image: homework-hub:latest
    restart: unless-stopped
    user: "568:568"
    environment:
      # --- Vaultwarden (bw CLI — set via Portainer stack env vars) ---
      BW_SERVER: ${BW_SERVER}
      BW_CLIENTID: ${BW_CLIENTID}
      BW_CLIENTSECRET: ${BW_CLIENTSECRET}
      BW_PASSWORD: ${BW_PASSWORD}
      # --- Runtime tunables (defaults match container layout) ---
      HOMEWORK_HUB_CONFIG_DIR: /config
      HOMEWORK_HUB_TOKENS_DIR: /config/tokens
      HOMEWORK_HUB_STATE_DB: /config/state.db
      HOMEWORK_HUB_LOG_DIR: /logs
      HOMEWORK_HUB_SYNC_CRON: "7 * * * *"
      HOMEWORK_HUB_HEALTH_PORT: "30062"
      LOG_LEVEL: INFO
      TZ: Australia/Melbourne
      # TrueNAS host uses Cloudflare/Quad9 DNS, not Pi-hole, so the
      # *.homelab domain doesn't resolve from inside the container.
      # Tell the bw CLI (Node) to trust Caddy's local CA when hitting
      # https://vaultwarden.homelab.
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/caddy-local-ca.crt
    extra_hosts:
      # Map vaultwarden.homelab -> the TrueNAS host IP (Caddy is bound there).
      - "vaultwarden.homelab:192.168.1.100"
    volumes:
      - /mnt/tank/Apps/HomeworkHub/Config:/config
      - /mnt/tank/Apps/HomeworkHub/Logs:/logs
      # Caddy's local CA -- needed by NODE_EXTRA_CA_CERTS above so bw can
      # validate the self-signed cert behind https://vaultwarden.homelab.
      - /mnt/tank/Apps/Caddy/Data/caddy/pki/authorities/local/root.crt:/etc/ssl/certs/caddy-local-ca.crt:ro
    ports:
      # Health endpoint -- Uptime Kuma polls this. NOT exposed via Caddy
      # (no UI; ops-only surface).
      - "30062:30062"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:30062/health', timeout=5).status == 200 else 1)"]
      interval: 5m
      timeout: 10s
      start_period: 30s
      retries: 3
    labels:
      # WUD: notify-only (custom-built image, GitOps handles rebuilds).
      # See [[Auto Updates]] for label conventions.
      wud.watch: "true"
      wud.watch.digest: "false"
      wud.tag.include: "^latest$"
      wud.trigger.include: "discord.notify"
